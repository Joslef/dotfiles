general {
    lock_cmd = ~/.local/share/quickshell-lockscreen/lock.sh
    before_sleep_cmd = ~/.local/share/quickshell-lockscreen/lock.sh
    after_sleep_cmd = hyprctl dispatch dpmsactivate
}

listener {
    timeout = 600
    on-timeout = busctl --user set-property rs.wl-gammarelay / rs.wl.gammarelay Brightness d 0.25
    on-resume = busctl --user set-property rs.wl-gammarelay / rs.wl.gammarelay Brightness d 1.0
}

listener {
    timeout = 1200
    on-timeout = ~/.local/share/quickshell-lockscreen/lock.sh
}

listener {
    timeout = 1800
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

listener {
    timeout = 2700
    on-timeout = systemctl suspend
}
