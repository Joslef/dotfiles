# Boost priority of any Bluetooth sink/source high enough to always win
# the default-node selection, even over a previously-saved non-BT default.
# find-selected-default-node gives saved node +30000 bonus; BT base is ~1010.
# Setting 32000 ensures any connected BT device beats a saved speaker default.
monitor.bluez.rules = [
  {
    matches = [
      { node.name = "~bluez_output.*" }
    ]
    actions = {
      update-props = {
        priority.session = 32000
      }
    }
  }
]
