general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = pidof hyprlock || hyprlock
    after_sleep_cmd = hyprctl dispatch dpmsactivate
}

listener {
    timeout = 600
    on-timeout = busctl --user set-property rs.wl-gammarelay / rs.wl.gammarelay Brightness d 0.25
    on-resume = busctl --user set-property rs.wl-gammarelay / rs.wl.gammarelay Brightness d 1.0
}

listener {
    timeout = 1800
    on-timeout = pidof hyprlock || hyprlock
}

listener {
    timeout = 3600
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}
