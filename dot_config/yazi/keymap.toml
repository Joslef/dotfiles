[mgr]
prepend_keymap = [
  { on = "<S-l>", run = "tab_switch 1 --relative", desc = "Switch to next tab" },
  { on = "<S-h>", run = "tab_switch -1 --relative", desc = "Switch to previous tab" },
  { on = "<C-w>", run = "tab_close", desc = "Close tab" },
  { on = "e", run = "shell 'ouch decompress \"$@\" --yes'", desc = "Extract archive" },
  { on = "c", run = "plugin ouch", desc = "Compress file/folder" },
  { on = "l", run = "plugin smart-enter", desc = "Enter directory or open file" },
  { on = "f", run = "plugin jump-to-char", desc = "Jump to char" },
]
